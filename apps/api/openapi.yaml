openapi: 3.0.3
info:
  title: Lekhaly API
  version: 0.1.0
servers:
  - url: http://localhost:3000
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        statusCode: { type: integer }
        message: { type: string }
        error: { type: string }
    IdResponse:
      type: object
      properties:
        id: { type: string }
    Pagination:
      type: object
      properties:
        skip: { type: integer }
        take: { type: integer }
    VoucherLineInput:
      type: object
      properties:
        accountId: { type: string }
        partyId: { type: string }
        itemId: { type: string }
        description: { type: string }
        debit: { type: number }
        credit: { type: number }
        taxCodeId: { type: string }
        taxAmount: { type: number }
    VoucherDraftInput:
      type: object
      required: [voucherType, voucherDate, lines]
      properties:
        voucherType:
          type: string
          enum: [sales_invoice, sales_return, purchase, purchase_return, receipt, payment, journal, opening, reversal]
        voucherDate: { type: string, format: date-time }
        partyId: { type: string }
        memo: { type: string }
        lines:
          type: array
          items: { $ref: "#/components/schemas/VoucherLineInput" }
    InvoiceItemInput:
      type: object
      properties:
        itemId: { type: string }
        description: { type: string }
        qty: { type: number }
        rate: { type: number }
        taxCodeId: { type: string }
    InvoiceDraftInput:
      type: object
      required: [type, partyId, date, receivableAccountId, items]
      properties:
        type: { type: string, enum: [sales, sales_return] }
        partyId: { type: string }
        date: { type: string, format: date-time }
        dueDate: { type: string, format: date-time }
        receivableAccountId: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/InvoiceItemInput" }
    ExpenseDraftInput:
      type: object
      required: [date, amount, expenseAccountId, paymentAccountId]
      properties:
        date: { type: string, format: date-time }
        vendorId: { type: string }
        amount: { type: number }
        taxCodeId: { type: string }
        description: { type: string }
        attachmentId: { type: string }
        expenseAccountId: { type: string }
        paymentAccountId: { type: string }
    BankAccountInput:
      type: object
      required: [accountId]
      properties:
        accountId: { type: string }
        bankName: { type: string }
        accountNumber: { type: string }
    BankStatementInput:
      type: object
      required: [bankAccountId, periodFrom, periodTo, openingBalance, closingBalance]
      properties:
        bankAccountId: { type: string }
        periodFrom: { type: string, format: date-time }
        periodTo: { type: string, format: date-time }
        openingBalance: { type: number }
        closingBalance: { type: number }
    BankStatementLineInput:
      type: object
      required: [date, amount, debitCredit]
      properties:
        date: { type: string, format: date-time }
        description: { type: string }
        amount: { type: number }
        debitCredit: { type: string, enum: [debit, credit] }
    ReconcileInput:
      type: object
      required: [statementLineId, voucherId]
      properties:
        statementLineId: { type: string }
        voucherId: { type: string }
        voucherLineId: { type: string }
    RoleInput:
      type: object
      required: [name, permissionCodes]
      properties:
        name: { type: string }
        permissionCodes:
          type: array
          items: { type: string }
    UserInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        name: { type: string }
        password: { type: string }
        roleIds:
          type: array
          items: { type: string }
    TaxCodeInput:
      type: object
      required: [name, rate]
      properties:
        name: { type: string }
        rate: { type: number }
        isInclusive: { type: boolean }
        inputTaxAccountId: { type: string }
        outputTaxAccountId: { type: string }
paths:
  /auth/login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [companyCode, email, password]
              properties:
                companyCode: { type: string }
                email: { type: string }
                password: { type: string }
                totpCode: { type: string }
                deviceId: { type: string }
                deviceLabel: { type: string }
                rememberDevice: { type: boolean }
      responses:
        "200": { description: OK }
  /auth/register:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [companyCode, companyName, name, email, password]
              properties:
                companyCode: { type: string }
                companyName: { type: string }
                name: { type: string }
                email: { type: string }
                password: { type: string }
      responses:
        "200": { description: OK }
  /auth/refresh:
    post:
      security: []
      responses:
        "200": { description: OK }
  /auth/logout:
    post:
      security: []
      responses:
        "200": { description: OK }
  /auth/profile:
    get:
      responses: { "200": { description: OK } }
    patch:
      responses: { "200": { description: OK } }
  /auth/company:
    get:
      responses: { "200": { description: OK } }
    patch:
      responses: { "200": { description: OK } }
  /auth/notifications:
